# Alembic configuration for Carve.
#
# The state-store URL is supplied at runtime by `carve.core.state.database`,
# which calls `command.upgrade(...)` directly with a Config built from the
# project's `Config.server.state_store`. This file exists so Alembic CLI
# usage (e.g. `alembic revision -m "..."`) finds the env and works the same
# way contributors already expect.
#
# Migrations live directly under `migrations/` (no `versions/` subdir) so
# the file map in spec M1.1-06 stays accurate.

[alembic]
script_location = migrations
sqlalchemy.url = sqlite:///.carve/state.db
file_template = %%(rev)s_%%(slug)s

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = WARN
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
