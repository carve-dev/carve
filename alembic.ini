# Alembic configuration for Carve.
#
# The state-store URL is supplied at runtime by `carve.core.state.database`,
# which calls `command.upgrade(...)` directly with a Config built from the
# project's `Config.state_store.url`. This file exists so Alembic CLI usage
# (e.g. `alembic revision -m "..."`) finds the env and works the same way
# contributors already expect.
#
# v0.1-01 retired SQLite as a runtime backend. The CLI fallback URL below
# reads from $DATABASE_URL with a Postgres default that matches the
# docker-compose bundle in v0.1-02; contributors who set DATABASE_URL get
# their own server, contributors who don't get a friendly Postgres URL.

[alembic]
script_location = migrations
sqlalchemy.url = postgresql+psycopg://carve:carve@localhost:5432/carve
file_template = %%(rev)s_%%(slug)s

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = WARN
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
