version: 2

models:
  - name: mart_revenue
    columns:
      - name: order_id
        tests:
          - not_null
          - unique
  - name: dim_customers
    columns:
      - name: customer_id
        tests:
          - not_null
          - unique
          - relationships:
              to: ref('stg_customers')
              field: customer_id
